<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HubTrack Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
    background:#0b1120;
    color:white;
}
.card{
    background:#111827;
    border:1px solid rgba(255,255,255,.08);
}
textarea{resize:none;}
</style>
</head>
<body class="p-5 min-h-screen">

<div class="max-w-7xl mx-auto">

    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-4xl font-bold">HubTrack Pro</h1>
            <p class="text-gray-400">Advanced Roblox Analytics</p>
        </div>
        <div class="flex gap-3 items-center">
            <span id="statusText" class="text-sm text-gray-400"></span>
            <button onclick="loadLogs()" class="bg-green-600 px-4 py-3 rounded-xl">
                Refresh
            </button>
        </div>
    </div>

    <!-- Stats -->
    <div class="grid md:grid-cols-4 gap-4 mb-8">
        <div class="card rounded-xl p-5">
            <p>Total Executes</p>
            <h2 id="statExecutes" class="text-3xl font-bold">0</h2>
        </div>
        <div class="card rounded-xl p-5">
            <p>Unique Users</p>
            <h2 id="statUsers" class="text-3xl font-bold">0</h2>
        </div>
        <div class="card rounded-xl p-5">
            <p>Executors</p>
            <h2 id="statExecutors" class="text-3xl font-bold">0</h2>
        </div>
        <div class="card rounded-xl p-5">
            <p>Error Rate</p>
            <h2 id="statErrors" class="text-3xl font-bold">0%</h2>
        </div>
    </div>

    <!-- Charts -->
    <div class="grid md:grid-cols-2 gap-6 mb-8">
        <div class="card rounded-xl p-5">
            <canvas id="executorChart"></canvas>
        </div>
        <div class="card rounded-xl p-5">
            <canvas id="countryChart"></canvas>
        </div>
    </div>

    <!-- Script Generator -->
    <div class="grid lg:grid-cols-2 gap-6 mb-8">
        <div class="card rounded-xl p-5">
            <h2 class="text-2xl font-bold mb-4">Lua Script Input</h2>

            <input id="scriptName"
                   class="w-full p-3 bg-slate-900 rounded-xl mb-4"
                   placeholder="Script Name">

            <textarea id="rawCode"
                      rows="18"
                      class="w-full p-4 bg-black rounded-xl font-mono"
                      placeholder="Lua kodunu gir..."></textarea>

            <button onclick="generateUsage()"
                    class="w-full mt-4 bg-blue-600 py-4 rounded-xl font-bold">
                Generate Usage Code
            </button>
        </div>

        <div class="card rounded-xl p-5">
            <div class="flex justify-between mb-4">
                <h2 class="text-2xl font-bold">Usage Code</h2>
                <button onclick="copyCode()" class="bg-cyan-600 px-4 rounded-xl">
                    Copy
                </button>
            </div>

            <textarea id="usageCode"
                      rows="22"
                      readonly
                      class="w-full p-4 bg-black rounded-xl text-cyan-400 font-mono"></textarea>
        </div>
    </div>

    <!-- Search -->
    <div class="card rounded-xl p-5 mb-8">
        <input id="searchBox"
               class="w-full bg-black p-4 rounded-xl"
               placeholder="Search username / userId / executor">
    </div>

    <!-- Logs -->
    <div class="card rounded-xl p-5">
        <h2 class="text-2xl font-bold mb-4">Live Logs</h2>
        <div id="logsContainer" class="space-y-3 max-h-[500px] overflow-auto"></div>
    </div>

</div>

<script>
let executorChart;
let countryChart;

function randomColor(seed){
    let hash=0;
    for(let i=0;i<seed.length;i++){
        hash=seed.charCodeAt(i)+((hash<<5)-hash);
    }
    return `hsl(${Math.abs(hash)%360},70%,60%)`;
}

function setStatus(message, isError=false){
    const status=document.getElementById("statusText");
    status.textContent=message || "";
    status.className=`text-sm ${isError ? "text-red-400" : "text-gray-400"}`;
}

function escapeHtml(value){
    return String(value ?? "").replace(/[&<>"']/g, char=>({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        "\"":"&quot;",
        "'":"&#39;"
    }[char]));
}

async function parseJsonResponse(res){
    const text=await res.text();
    try{
        const data=text ? JSON.parse(text) : {};
        if(!res.ok){
            throw new Error(data.error || `HTTP ${res.status}`);
        }
        return data;
    }catch(err){
        if(!res.ok){
            throw err;
        }
        throw new Error("Server returned invalid JSON");
    }
}

async function generateUsage(){
    const name=document.getElementById("scriptName").value.trim();
    const code=document.getElementById("rawCode").value;

    if(!code.trim()){
        alert("Önce Lua kodu gir.");
        return;
    }

    try{
        setStatus("Generating usage code...");
        const res=await fetch("/api/track",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({action:"create", name, code})
        });

        const data=await parseJsonResponse(res);
        document.getElementById("usageCode").value=data.modifiedLua || "";
        setStatus("Usage code generated.");
    }catch(err){
        setStatus(err.message, true);
        alert(err.message);
    }
}

async function copyCode(){
    const value=document.getElementById("usageCode").value;
    if(!value){
        alert("Kopyalanacak kod yok.");
        return;
    }
    await navigator.clipboard.writeText(value);
    setStatus("Copied usage code.");
}

let allLogs=[];

async function loadLogs(){
    try{
        setStatus("Loading logs...");
        const [logsRes, statsRes]=await Promise.all([
            fetch("/api/track?action=logs", {cache:"no-store"}),
            fetch("/api/track?action=stats", {cache:"no-store"})
        ]);

        allLogs=await parseJsonResponse(logsRes);
        const stats=await parseJsonResponse(statsRes);

        document.getElementById("statExecutes").textContent=stats.totalExecutes ?? allLogs.length;
        document.getElementById("statUsers").textContent=stats.totalUsers ?? new Set(allLogs.map(x=>x.userId)).size;
        document.getElementById("statExecutors").textContent=stats.totalExecutors ?? new Set(allLogs.map(x=>x.executor)).size;
        document.getElementById("statErrors").textContent=`${stats.errorRate ?? 0}%`;

        renderLogs();
        setStatus(`Loaded ${allLogs.length} logs.`);
    }catch(err){
        setStatus(err.message, true);
        document.getElementById("logsContainer").innerHTML=`<div class="bg-red-950/60 rounded-xl p-4 text-red-200">${escapeHtml(err.message)}</div>`;
    }
}

function renderLogs(){
    const query=document.getElementById("searchBox").value.toLowerCase().trim();
    const container=document.getElementById("logsContainer");
    const executors={};
    const countries={};

    const filtered=allLogs.filter(log=>{
        const haystack=[log.username, log.userId, log.executor, log.country, log.scriptName].join(" ").toLowerCase();
        return !query || haystack.includes(query);
    });

    container.innerHTML=filtered.length ? "" : `<div class="text-gray-400">No logs found.</div>`;

    filtered.forEach(log=>{
        const executor=log.executor || "Unknown";
        const country=log.country || "Unknown";
        executors[executor]=(executors[executor]||0)+1;
        countries[country]=(countries[country]||0)+1;

        container.innerHTML += `
            <div class="bg-slate-900 rounded-xl p-4">
                <div class="font-bold">${escapeHtml(log.username || "Unknown")}</div>
                <div>User ID: ${escapeHtml(log.userId || "Unknown")}</div>
                <div>Script: ${escapeHtml(log.scriptName || "Untitled")}</div>
                <div>Executor: ${escapeHtml(executor)}</div>
                <div>Country: ${escapeHtml(country)}</div>
                <div>Device: ${escapeHtml(log.device || "Unknown")}</div>
                <div>Event: ${escapeHtml(log.event || "finish")}</div>
                <div>Status: ${log.success === false ? "Error" : "Success"}</div>
                <div>Execute #: ${escapeHtml(log.executeNumber || "?")}</div>
                ${log.error ? `<pre class="mt-2 whitespace-pre-wrap text-red-300">${escapeHtml(log.error)}</pre>` : ""}
            </div>
        `;
    });

    drawCharts(executors,countries);
}

function drawCharts(executors,countries){
    const eLabels=Object.keys(executors);
    const eData=Object.values(executors);

    const cLabels=Object.keys(countries);
    const cData=Object.values(countries);

    if(executorChart) executorChart.destroy();
    if(countryChart) countryChart.destroy();

    executorChart=new Chart(
        document.getElementById("executorChart"),
        {
            type:"pie",
            data:{
                labels:eLabels,
                datasets:[{
                    data:eData,
                    backgroundColor:eLabels.map(x=>randomColor(x))
                }]
            }
        }
    );

    countryChart=new Chart(
        document.getElementById("countryChart"),
        {
            type:"bar",
            data:{
                labels:cLabels,
                datasets:[{
                    data:cData
                }]
            }
        }
    );
}

document.getElementById("searchBox").addEventListener("input", renderLogs);
loadLogs();
</script>
</body>
</html>
