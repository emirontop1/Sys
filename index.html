<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HubTrack</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{
background:#0f172a;
color:white;
}
.card{
background:#1e293b;
border-radius:16px;
padding:20px;
}
</style>
</head>
<body class="p-4">

<div class="max-w-5xl mx-auto space-y-6">

<h1 class="text-3xl font-bold">HubTrack Dashboard</h1>

<div class="card space-y-4">
<input id="scriptName" class="w-full p-3 rounded bg-slate-900" placeholder="Script Name">

<textarea id="rawCode" rows="10" class="w-full p-3 rounded bg-slate-900 font-mono" placeholder="Lua code"></textarea>

<button onclick="generateScript()" class="w-full bg-blue-600 p-3 rounded">
Generate Script
</button>
</div>

<div class="card">
<textarea id="outputCode" rows="16" readonly class="w-full p-3 rounded bg-black text-cyan-400 font-mono"></textarea>
</div>

<div class="card">
<div class="flex justify-between mb-4">
<h2>Logs</h2>
<button onclick="loadLogs()" class="bg-green-600 px-4 py-2 rounded">Refresh</button>
</div>

<div id="logsContainer" class="space-y-3"></div>
</div>

</div>

<script>
async function generateScript(){
    const name=document.getElementById("scriptName").value;
    const code=document.getElementById("rawCode").value;

    const res=await fetch("/api/track",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            action:"create",
            name,
            code
        })
    });

    const data=await res.json();

    if(data.modifiedLua){
        document.getElementById("outputCode").value=data.modifiedLua;
    } else {
        alert(JSON.stringify(data));
    }
}

async function loadLogs(){
    const res=await fetch("/api/track?action=data");
    const logs=await res.json();

    const c=document.getElementById("logsContainer");
    c.innerHTML="";

    logs.forEach(log=>{
        c.innerHTML += `
        <div class="bg-slate-900 rounded p-3">
            <div>User: ${log.username}</div>
            <div>ID: ${log.userId}</div>
            <div>Executor: ${log.executor}</div>
            <div>Place: ${log.placeId}</div>
            <div>Status: ${log.success ? "SUCCESS" : log.error}</div>
        </div>
        `;
    });
}
</script>

</body>
</html>
